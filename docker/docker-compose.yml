services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retnza
      POSTGRES_PASSWORD: retnza
      POSTGRES_DB: retnza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retnza"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://retnza:retnza@postgres:5432/retnza
      DATABASE_URL_SYNC: postgresql://retnza:retnza@postgres:5432/retnza
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip install -q -r backend/requirements.txt &&
             python backend/scripts/seed_db.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir backend"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
